  - Identity Verification
  - Synthetic Identity
  - Account Takeover
  - First-Party Fraud
  - Financial Services
  - Risk Scoring
  - Fintech
  - KYC
  - AML
apis:
  - aid: sentilink:sentilink-fraud-scores-api
    name: SentiLink Fraud Scores API
    description: >-
      REST API providing real-time fraud risk scores including Synthetic Abuse
      Score, ID Theft Score, First-Party Fraud Score, and PII Risk Scores.
      Returns a numeric score (0–999) along with reason codes explaining the
      fraud risk factors for each identity submitted during account application
      or onboarding. Integrates via a single endpoint serving all application
      risk products.
    humanURL: https://www.sentilink.com/product-overview
    baseURL: https://api.sentilink.com
    tags:
      - Fraud Scores
      - Synthetic Identity
      - Identity Theft
      - First-Party Fraud
      - Risk Scoring
    properties:
      - type: Documentation
        url: https://www.sentilink.com/product-overview
      - type: Sandbox
        url: https://api.sandbox-sentilink.com
  - aid: sentilink:sentilink-tcvs-api
    name: SentiLink TCVS API
    description: >-
      REST API providing programmatic access to the U.S. Treasury Check
      Verification Service (TCVS), enabling real-time, high-volume Treasury
      check validation for financial institutions. Accepts check symbol number,
      serial number, amount, bank routing number, and optional payee name, and
      returns match results against Treasury department records. Free for all
      financial institutions.
    humanURL: https://resources.sentilink.com/blog/sentilink-tcvs-api
    baseURL: https://api.sentilink.com
    tags:
      - Treasury Check
      - Check Verification
      - TCVS
      - Check Fraud
    properties:
      - type: Documentation
        url: https://resources.sentilink.com/blog/sentilink-tcvs-api
